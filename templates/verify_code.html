<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>التحقق من الرمز</title>

    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./statics/css/forgot_password.css" />
  </head>

  <body class="login-page">
    <div class="page-bg"></div>

    <header class="top-bar">
      <div class="right">
        <img
          src="./statics/img/Assas_clear_logo.png"
          class="assas-logo"
          alt="شعار عسّاس"
        />
      </div>

      <div class="left">
        <span class="lang language-toggle">
          <span class="lang-text" data-ar="English" data-en="العربية">
            English
          </span>

          <i class="fa-solid fa-globe"></i>
        </span>

        <img
          src="./statics/img/saudi_grey_palm.png"
          class="vision-logo"
          alt="رؤية السعودية 2030"
        />
      </div>
    </header>

    <div class="green-panel"></div>

    <main class="login-card">
      <h2 class="login-title">
        <span data-ar="رمز التحقق" data-en="Verification Code">
          رمز التحقق
        </span>

        <a href="forgot_password.html" class="back-arrow">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </h2>

      <p
        class="hint"
        data-ar="أدخل الرمز المرسل إلى بريدك الإلكتروني"
        data-en="Enter the code sent to your email"
      >
        أدخل الرمز المرسل إلى بريدك الإلكتروني
      </p>

      <div class="input-group">
        <span class="input-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </span>

        <input
          type="text"
          id="code"
          placeholder="Verification Code"
          data-placeholder-ar="رمز التحقق"
          data-placeholder-en="Verification Code"
        />
      </div>

      <button
        id="verifyCodeBtn"
        class="login-btn"
        data-ar="تحقق"
        data-en="Verify"
      >
        تحقق
      </button>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="./statics/js/forgot_password_flow.js"></script>
    <script type="module" src="./statics/js/settings.js"></script>
  </body>
</html>
