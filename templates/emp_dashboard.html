<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة الموظف</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- style sheet -->
    <link rel="stylesheet" href="../statics/css/dashboard.css" />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside>
        <img src="../statics/img/Assas_green_logo.png" alt="logo" />
        <ul>
          <li class="active">
            <a href="dashboard.html">
              <i class="fa-solid fa-chart-line"></i> لوحة التحكم
            </a>
          </li>
          <li>
            <a href="map.html">
              <i class="fa-solid fa-map-location-dot"></i> الخريطة
            </a>
          </li>
          <li>
            <a href="projects.html">
              <i class="fa-solid fa-folder"></i> المشاريع
            </a>
          </li>
          <li>
            <a href="profile.html">
              <i class="fa-solid fa-user"></i> الصفحة الشخصية
            </a>
          </li>
        </ul>

        <button class="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i> تسجيل خروج
        </button>
      </aside>

      <!-- Main Content -->
      <main>
        <div class="topbar">
          <h2>لوحة الموظف</h2>
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="ابحث عن موقع أو رقم البلاغ "
            />
          </div>
        </div>

        <!-- Charts-->
        <div
          class="chart-container"
          style="
            display: flex;
            gap: 85px;
            justify-content: center;
            align-items: center;
          "
        >
          <div style="text-align: center">
            <canvas id="highChart" width="150" height="150"></canvas>
            <div style="margin-top: 8px">عالية</div>
          </div>

          <div style="text-align: center">
            <canvas id="mediumChart" width="150" height="150"></canvas>
            <div style="margin-top: 8px">متوسطة</div>
          </div>

          <div style="text-align: center">
            <canvas id="lowChart" width="150" height="150"></canvas>
            <div style="margin-top: 8px">منخفضة</div>
          </div>

          <div style="text-align: center">
            <canvas id="completedChart" width="150" height="150"></canvas>
            <div style="margin-top: 8px">مكتمل</div>
          </div>
        </div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Statistics -->
        <div class="stats">
          <div class="card">
            <h3 id="totalReports">0</h3>
            <p>إجمالي البلاغات</p>
          </div>

          <div class="card">
            <h3 id="totalCost">0</h3>
            <p>التكلفة الإجمالية للإصلاحات</p>
          </div>

          <div class="card">
            <h3 id="spentCost">0</h3>
            <p>التكلفة المستهلكة</p>
          </div>

          <div class="card">
            <h3 id="damagedRoads">0</h3>
            <p>عدد الطرق المتضررة</p>
          </div>
        </div>

        <!-- Filters Section -->
        <div class="filter-section">
          <div class="filter-group">
            <select id="filterSeverity">
              <option value="" disabled selected>مستوى الخطورة</option>
              <option value="">الكل</option>
              <option value="high">عالية</option>
              <option value="medium">متوسطة</option>
              <option value="low">منخفضة</option>
            </select>
          </div>

          <div class="filter-group">
            <select id="filterLocation">
              <option value="" disabled selected>الموقع</option>
              <option value="">الكل</option>
              <!-- باقي المواقع يتم ملؤها ديناميكيًا -->
            </select>
          </div>

          <div class="filter-group">
            <select id="filterStatus">
              <option value="" disabled selected>الحالة</option>
              <option value="">الكل</option>
              <option value="completed">مكتمل</option>
              <option value="in_progress">قيد التنفيذ</option>
              <option value="pending">غير مكتمل</option>
            </select>
          </div>

          <div class="filter-group">
            <input type="text" id="filterId" placeholder="أدخل رقم البلاغ" />
          </div>

          <div class="filter-group">
            <label>من</label>
            <input type="date" id="filterDateFrom" />
          </div>
          <div class="filter-group">
            <label>إلى</label>
            <input type="date" id="filterDateTo" />
          </div>

          <div class="filter-actions">
            <button class="filter-btn reset-btn" id="resetFiltersBtn">
              <i class="fa-solid fa-rotate-right"></i> إعادة ضبط
            </button>
          </div>
        </div>

        <!-- Table -->
        <table>
          <thead>
            <tr>
              <th>حذف</th>
              <th>رقم</th>
              <th>الموقع</th>
              <th>التاريخ</th>
              <th>الحالة</th>
              <th>مستوى الخطورة</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination" id="paginationControls">
          <button class="page-btn" id="prevPageBtn" disabled>
            <i class="fas fa-chevron-right"></i> السابق
          </button>
          <span class="page-info" id="pageInfo">صفحة 1 من 1</span>
          <button class="page-btn" id="nextPageBtn" disabled>
            التالي <i class="fas fa-chevron-left"></i>
          </button>
        </div>
      </main>
    </div>

    <!-- Google Maps Initialization -->
    <script>
      /* ===================================================
         1. Public Window Functions (Pre-Init)
      =================================================== */
      let map;

      // Ensure initMap is available globally for Google Maps API callback
      window.initMap = function () {
        map = new google.maps.Map(document.getElementById("map"), {
          zoom: 11,
          center: { lat: 24.7136, lng: 46.6753 }, // Riyadh
        });
      };
    </script>

    <!-- Firebase + Dashboard Logic -->
    <script type="module" src="../statics/js/dashboard.js"></script>

    <!-- Google Maps -->
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-uPN8afr4qXu5JE1Iew0wR5WfK3YscwY&callback=initMap"
    ></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  </body>
</html>
