<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- settings and dark mode support added -->
    <link rel="stylesheet" href="./statics/css/settings.css" />
    <title>لوحة المهندس</title>

    <!-- Assas icon -->
    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- style sheet -->
    <link rel="stylesheet" href="../statics/css/dashboard.css" />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main>
        <div class="topbar">
          <!-- translation support injected -->
          <h2 data-ar="لوحة المهندس" data-en="Engineer Dashboard">
            لوحة المهندس
          </h2>
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="ابحث عن موقع أو رقم البلاغ "
              data-placeholder-ar="ابحث عن موقع أو رقم البلاغ"
              data-placeholder-en="Search by location or report ID"
            />
          </div>
        </div>

        <!-- Charts-->
        <div
          class="chart-container"
          style="
            display: flex;
            gap: 85px;
            justify-content: center;
            align-items: center;
          "
        >
          <div style="text-align: center">
            <canvas id="assignedChart" width="150" height="150"></canvas>
            <!-- translation support injected -->
            <div style="margin-top: 8px" data-ar="بلاغاتي" data-en="My Reports">
              بلاغاتي
            </div>
          </div>

          <div style="text-align: center">
            <canvas id="completedChart" width="150" height="150"></canvas>
            <!-- translation support injected -->
            <div style="margin-top: 8px" data-ar="مكتملة" data-en="Completed">
              مكتملة
            </div>
          </div>

          <div style="text-align: center">
            <canvas id="inProgressChart" width="150" height="150"></canvas>
            <!-- translation support injected -->
            <div
              style="margin-top: 8px"
              data-ar="قيد التنفيذ"
              data-en="In Progress"
            >
              قيد التنفيذ
            </div>
          </div>

          <div style="text-align: center">
            <canvas id="totalChart" width="150" height="150"></canvas>
            <!-- translation support injected -->
            <div
              style="margin-top: 8px"
              data-ar="كل البلاغات"
              data-en="All Reports"
            >
              كل البلاغات
            </div>
          </div>
        </div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Filters Section -->
        <div class="filter-section">
          <div class="filter-group">
            <select id="filterSeverity">
              <!-- translation support injected -->
              <option
                value=""
                disabled
                selected
                data-ar="الخطورة"
                data-en="Severity"
              >
                الخطورة
              </option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="high" data-ar="عالية" data-en="High">عالية</option>
              <option value="medium" data-ar="متوسطة" data-en="Medium">
                متوسطة
              </option>
              <option value="low" data-ar="منخفضة" data-en="Low">منخفضة</option>
            </select>
          </div>

          <div class="filter-group">
            <select id="filterDamageType">
              <!-- translation support injected -->
              <option
                value=""
                disabled
                selected
                data-ar="نوع الضرر"
                data-en="Damage Type"
              >
                نوع الضرر
              </option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="pothole" data-ar="حفرة" data-en="Pothole">
                حفرة
              </option>
              <option value="crack" data-ar="تشقق" data-en="Crack">تشقق</option>
              <option value="water" data-ar="تجمع مياه" data-en="Water Pooling">
                تجمع مياه
              </option>
              <option value="normal" data-ar="سليم" data-en="Normal">
                سليم
              </option>
            </select>
          </div>

          <div class="filter-group">
            <select id="filterLocation">
              <!-- Injected translation support for location filter -->
              <option
                value=""
                disabled
                selected
                data-ar="الموقع"
                data-en="Location"
              >
                الموقع
              </option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="الرياض" data-ar="الرياض" data-en="Riyadh">
                الرياض
              </option>
              <option value="جدة" data-ar="جدة" data-en="Jeddah">جدة</option>
              <option value="الدمام" data-ar="الدمام" data-en="Dammam">
                الدمام
              </option>
              <option value="الخبر" data-ar="الخبر" data-en="Khobar">
                الخبر
              </option>
              <option value="مكة" data-ar="مكة" data-en="Makkah">مكة</option>
              <option
                value="المدينة المنورة"
                data-ar="المدينة المنورة"
                data-en="Madinah"
              >
                المدينة المنورة
              </option>
              <option value="الجبيل" data-ar="الجبيل" data-en="Jubail">
                الجبيل
              </option>
              <option value="الظهران" data-ar="الظهران" data-en="Dhahran">
                الظهران
              </option>
              <option value="بريدة" data-ar="بريدة" data-en="Buraidah">
                بريدة
              </option>
              <option value="الرس" data-ar="الرس" data-en="Ar Rass">
                الرس
              </option>
              <option value="عنيزة" data-ar="عنيزة" data-en="Unaizah">
                عنيزة
              </option>
              <option value="تبوك" data-ar="تبوك" data-en="Tabuk">تبوك</option>
              <option value="حائل" data-ar="حائل" data-en="Hail">حائل</option>
              <option value="عرعر" data-ar="عرعر" data-en="Arar">عرعر</option>
              <option value="جازان" data-ar="جازان" data-en="Jazan">
                جازان
              </option>
              <option value="نجران" data-ar="نجران" data-en="Najran">
                نجران
              </option>
              <option value="الباحة" data-ar="الباحة" data-en="Al Baha">
                الباحة
              </option>
              <option value="القنفذة" data-ar="القنفذة" data-en="Al Qunfudhah">
                القنفذة
              </option>
              <option value="سكاكا" data-ar="سكاكا" data-en="Sakaka">
                سكاكا
              </option>
              <option value="الأفلاج" data-ar="الأفلاج" data-en="Al Aflaj">
                الأفلاج
              </option>
              <option
                value="وادي الدواسر"
                data-ar="وادي الدواسر"
                data-en="Wadi Al Dawasir"
              >
                وادي الدواسر
              </option>
            </select>
          </div>

          <div class="filter-group">
            <!-- translation support injected -->
            <label data-ar="من" data-en="From">من</label>
            <input type="date" id="filterDateFrom" />
          </div>
          <div class="filter-group">
            <!-- translation support injected -->
            <label data-ar="إلى" data-en="To">إلى</label>
            <input type="date" id="filterDateTo" />
          </div>

          <div class="filter-actions">
            <button class="filter-btn reset-btn" id="resetFiltersBtn">
              <i class="fa-solid fa-rotate-right"></i>
              <!-- translation support injected -->
              <span data-ar="إعادة ضبط" data-en="Reset">إعادة ضبط</span>
            </button>
          </div>
        </div>

        <!-- Table -->
        <table>
          <thead>
            <tr>
              <!-- translation support injected -->
              <th data-ar="إسناد" data-en="Assign">إسناد</th>
              <th data-ar="رقم البلاغ" data-en="Report ID">رقم البلاغ</th>
              <th data-ar="تاريخ الإنشاء" data-en="Created Date">
                تاريخ الإنشاء
              </th>
              <th data-ar="الموقع" data-en="Location">الموقع</th>
              <th data-ar="الضرر" data-en="Damage">الضرر</th>
              <th data-ar="التنبؤ" data-en="Prediction">التنبؤ</th>
              <th data-ar="الخطورة" data-en="Severity">الخطورة</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination" id="paginationControls">
          <!-- translation support injected -->
          <button
            class="page-btn"
            id="prevPageBtn"
            disabled
            data-ar="السابق"
            data-en="Previous"
            data-icon-ar="fas fa-chevron-right"
            data-icon-en="fas fa-chevron-left"
          >
            <i class="fas fa-chevron-right"></i> السابق
          </button>
          <span class="page-info" id="pageInfo">1 من 1</span>
          <button
            class="page-btn"
            id="nextPageBtn"
            disabled
            data-ar="التالي"
            data-en="Next"
            data-icon-ar="fas fa-chevron-left"
            data-icon-en="fas fa-chevron-right"
          >
            التالي <i class="fas fa-chevron-left"></i>
          </button>
        </div>

        <!-- زر الإشعارات -->
        <div id="notificationBtn">
          <i class="fa-solid fa-bell"></i>
          <span id="notificationCount">0</span>
        </div>

        <!-- نافذة الإشعارات -->
        <div id="notificationPanel" class="hidden">
          <div class="notification-header">
            <!-- translation support injected -->
            <h3 data-ar="الإشعارات" data-en="Notifications">الإشعارات</h3>
          </div>

          <div id="notificationList"></div>
        </div>

        <div class="toast-container"></div>
      </main>
    </div>

    <!-- Google Maps Initialization -->
    <script>
      /* ===================================================
         1. Public Window Functions (Pre-Init)
      =================================================== */
      let map;

      // Ensure initMap is available globally for Google Maps API callback
      window.initMap = function () {
        map = new google.maps.Map(document.getElementById("map"), {
          zoom: 11,
          center: { lat: 24.7136, lng: 46.6753 }, // Riyadh
        });
      };
    </script>

    <!-- Firebase + Dashboard Logic -->
    <script type="module" src="./statics/js/eng_dashboard.js"></script>

    <!-- Google Maps -->
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-uPN8afr4qXu5JE1Iew0wR5WfK3YscwY&callback=initMap"
    ></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script type="module" src="../statics/js/loadSidebar.js"></script>
    <!-- settings logic injected -->
    <script type="module" src="./statics/js/settings.js"></script>
  </body>
</html>
