<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المشاريع</title>

    <!-- Assas icon -->
    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- style sheet -->
    <link rel="stylesheet" href="./statics/css/projects.css" />
    <!-- Injected dark theme support -->
    <link rel="stylesheet" href="./statics/css/settings.css" />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main>
        <div class="topbar">
          <!-- Injected translation support -->
          <h2 data-ar="المشاريع" data-en="Projects">المشاريع</h2>
          <div class="topbar-actions">
            <div class="filter-toggle">
              <!-- Injected translation support -->
              <button id="btnAll" class="toggle-btn active" data-ar="الكل" data-en="All">الكل</button>
              <button id="btnMine" class="toggle-btn" data-ar="بلاغاتي" data-en="My Reports">بلاغاتي</button>
            </div>
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>
              <!-- Injected translated placeholders -->
              <input
                type="text"
                id="searchInput"
                placeholder="ابحث عن موقع أو رقم البلاغ "
                data-placeholder-ar="ابحث عن موقع أو رقم البلاغ"
                data-placeholder-en="Search by location or report ID"
              />
            </div>
          </div>
        </div>

        <!-- report details card -->
        <div id="reportDetailsCard" class="report-details hidden"></div>

        <!-- Filters Section -->
        <div class="filter-section">
          <div class="filter-group">
            <select id="filterStatus">
              <!-- Injected translation support for options -->
              <option value="" disabled selected data-ar="الحالة" data-en="Status">الحالة</option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="completed" data-ar="مكتمل" data-en="Completed">مكتمل</option>
              <option value="in_progress" data-ar="قيد التنفيذ" data-en="In Progress">قيد التنفيذ</option>
              <option value="pending" data-ar="غير مكتمل" data-en="Pending">غير مكتمل</option>
            </select>
          </div>
          <div class="filter-group">
            <select id="filterSeverity">
              <!-- Injected translation support for options -->
              <option value="" disabled selected data-ar="الخطورة" data-en="Severity">الخطورة</option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="high" data-ar="عالية" data-en="High">عالية</option>
              <option value="medium" data-ar="متوسطة" data-en="Medium">متوسطة</option>
              <option value="low" data-ar="منخفضة" data-en="Low">منخفضة</option>
            </select>
          </div>

          <div class="filter-group">
            <select id="filterDamageType">
              <!-- Injected translation support for options -->
              <option value="" disabled selected data-ar="نوع الضرر" data-en="Damage Type">نوع الضرر</option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="pothole" data-ar="حفرة" data-en="Pothole">حفرة</option>
              <option value="crack" data-ar="تشقق" data-en="Crack">تشقق</option>
              <option value="water" data-ar="تجمع مياه" data-en="Water Pooling">تجمع مياه</option>
              <option value="normal" data-ar="سليم" data-en="Normal">سليم</option>
            </select>
          </div>

          <div class="filter-group">
            <select id="filterLocation">
              <!-- Injected translation support for location filter -->
              <option value="" disabled selected data-ar="الموقع" data-en="Location">الموقع</option>
              <option value="" data-ar="الكل" data-en="All">الكل</option>
              <option value="الرياض" data-ar="الرياض" data-en="Riyadh">الرياض</option>
              <option value="جدة" data-ar="جدة" data-en="Jeddah">جدة</option>
              <option value="الدمام" data-ar="الدمام" data-en="Dammam">الدمام</option>
              <option value="الخبر" data-ar="الخبر" data-en="Khobar">الخبر</option>
              <option value="مكة" data-ar="مكة" data-en="Makkah">مكة</option>
              <option value="المدينة المنورة" data-ar="المدينة المنورة" data-en="Madinah">المدينة المنورة</option>
              <option value="الجبيل" data-ar="الجبيل" data-en="Jubail">الجبيل</option>
              <option value="الظهران" data-ar="الظهران" data-en="Dhahran">الظهران</option>
              <option value="بريدة" data-ar="بريدة" data-en="Buraidah">بريدة</option>
              <option value="الرس" data-ar="الرس" data-en="Ar Rass">الرس</option>
              <option value="عنيزة" data-ar="عنيزة" data-en="Unaizah">عنيزة</option>
              <option value="تبوك" data-ar="تبوك" data-en="Tabuk">تبوك</option>
              <option value="حائل" data-ar="حائل" data-en="Hail">حائل</option>
              <option value="عرعر" data-ar="عرعر" data-en="Arar">عرعر</option>
              <option value="جازان" data-ar="جازان" data-en="Jazan">جازان</option>
              <option value="نجران" data-ar="نجران" data-en="Najran">نجران</option>
              <option value="الباحة" data-ar="الباحة" data-en="Al Baha">الباحة</option>
              <option value="القنفذة" data-ar="القنفذة" data-en="Al Qunfudhah">القنفذة</option>
              <option value="سكاكا" data-ar="سكاكا" data-en="Sakaka">سكاكا</option>
              <option value="الأفلاج" data-ar="الأفلاج" data-en="Al Aflaj">الأفلاج</option>
              <option value="وادي الدواسر" data-ar="وادي الدواسر" data-en="Wadi Al Dawasir">وادي الدواسر</option>
            </select>
          </div>

          <div class="filter-group">
            <!-- Injected translation support -->
            <label data-ar="من" data-en="From">من</label>
            <input type="date" id="filterDateFrom" />
          </div>
          <div class="filter-group">
            <!-- Injected translation support -->
            <label data-ar="إلى" data-en="To">إلى</label>
            <input type="date" id="filterDateTo" />
          </div>

          <div class="filter-actions">
            <!-- Injected translation support for reset button -->
            <button class="filter-btn reset-btn" id="resetFiltersBtn" data-ar="إعادة ضبط" data-en="Reset">
              <i class="fa-solid fa-rotate-right"></i> إعادة ضبط
            </button>
          </div>
        </div>

        <!-- Table -->
        <table>
          <thead>
            <tr>
              <!-- Injected translation support for table headers -->
              <th data-ar="حذف" data-en="Delete">حذف</th>
              <th data-ar="إجراءت" data-en="Actions">إجراءت</th>
              <th data-ar="رقم البلاغ" data-en="Report ID">رقم البلاغ</th>
              <th data-ar="الحالة" data-en="Status">الحالة</th>
              <th data-ar="الموقع" data-en="Location">الموقع</th>
              <th data-ar="تاريخ الإنشاء" data-en="Created Date">تاريخ الإنشاء</th>
              <th data-ar="تاريخ الإستلام" data-en="Assigned Date">تاريخ الإستلام</th>
              <th data-ar="تاريخ الإكتمال" data-en="Completed Date">تاريخ الإكتمال</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination" id="paginationControls">
          <!-- Injected translation support and icon handling -->
          <button
            class="page-btn"
            id="prevPageBtn"
            disabled
            data-ar="السابق"
            data-en="Previous"
            data-icon-ar="fas fa-chevron-right"
            data-icon-en="fas fa-chevron-left"
          >
            <i class="fas fa-chevron-right"></i> السابق
          </button>
          <span class="page-info" id="pageInfo">1 من 1</span>
          <button
            class="page-btn"
            id="nextPageBtn"
            disabled
            data-ar="التالي"
            data-en="Next"
            data-icon-ar="fas fa-chevron-left"
            data-icon-en="fas fa-chevron-right"
          >
            التالي <i class="fas fa-chevron-left"></i>
          </button>
        </div>
      </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <div id="customModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-icon">
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <!-- Injected translation support for modal -->
        <h3 id="modalTitle" data-ar="حذف البلاغ؟" data-en="Delete report?">حذف البلاغ؟</h3>
        <p id="modalText" data-ar="سيتم حذف البلاغ نهائيًا ولا يمكن التراجع" data-en="This report will be permanently deleted and cannot be restored.">سيتم حذف البلاغ نهائيًا ولا يمكن التراجع</p>

        <div class="modal-actions">
          <!-- Injected translation support for modal buttons -->
          <button id="cancelBtn" class="modal-btn cancel" data-ar="إلغاء" data-en="Cancel">إلغاء</button>
          <button id="confirmBtn" class="modal-btn confirm" data-ar="حذف" data-en="Delete">حذف</button>
        </div>
      </div>
    </div>
    <!-- Firebase + Dashboard Logic -->
    <script type="module" src="./statics/js/projects.js"></script>
    <script type="module" src="./statics/js/loadSidebar.js"></script>
    <!-- Injected settings integration for dark mode and translations -->
    <script type="module" src="./statics/js/settings.js"></script>
  </body>
</html>
