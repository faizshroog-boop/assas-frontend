<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تغيير كلمة المرور</title>

    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./statics/css/forgot_password.css" />
  </head>

  <body class="login-page">
    <div class="page-bg"></div>

    <header class="top-bar">
      <div class="right">
        <img
          src="./statics/img/Assas_clear_logo.png"
          class="assas-logo"
          alt="شعار عسّاس"
        />
      </div>

      <div class="left">
        <span class="lang language-toggle">
          <span class="lang-text" data-ar="English" data-en="العربية"
            >English</span
          >
          <i class="fa-solid fa-globe"></i>
        </span>

        <img
          src="./statics/img/saudi_grey_palm.png"
          class="vision-logo"
          alt="رؤية السعودية 2030"
        />
      </div>
    </header>

    <div class="green-panel"></div>

    <main class="login-card">
      <h2 class="login-title">
        <span data-ar="تغيير كلمة المرور" data-en="Reset Password">
          تغيير كلمة المرور
        </span>

        <a href="verify_code.html" class="back-arrow">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </h2>

      <div class="input-group">
        <span class="input-icon">
          <i class="fa-solid fa-key"></i>
        </span>

        <input
          type="password"
          id="newPassword"
          placeholder="كلمة المرور الجديدة"
          data-placeholder-ar="كلمة المرور الجديدة"
          data-placeholder-en="New Password"
        />
      </div>

      <div class="input-group">
        <span class="input-icon">
          <i class="fa-solid fa-check"></i>
        </span>

        <input
          type="password"
          id="confirmPassword"
          placeholder="تأكيد كلمة المرور الجديدة"
          data-placeholder-ar="تأكيد كلمة المرور الجديدة"
          data-placeholder-en="Confirm New Password"
        />
      </div>

      <button
        id="resetPasswordBtn"
        class="login-btn"
        data-ar="تحديث كلمة المرور"
        data-en="Update Password"
      >
        تحديث كلمة المرور
      </button>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="./statics/js/forgot_password_flow.js"></script>
    <script type="module" src="./statics/js/settings.js"></script>
  </body>
</html>
