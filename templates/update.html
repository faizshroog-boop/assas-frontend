<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحديث البلاغ</title>

    <!-- Assas icon -->
    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./statics/css/update.css" />
    <!-- Injected dark theme support -->
    <link rel="stylesheet" href="./statics/css/settings.css" />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <main>
        <section class="update-card">
          <div class="top-row">
            <h2 id="reportId" class="report-id">#---</h2>
            <!-- Injected translation support -->
            <span
              id="statusBadge"
              class="status-badge"
              data-ar="جاري التحميل..."
              data-en="Loading..."
            >
              جاري التحميل...
            </span>
          </div>

          <div class="progress-wrap">
            <div class="progress-step" id="step1"></div>
            <div class="progress-line"></div>
            <div class="progress-step" id="step2"></div>
            <div class="progress-line"></div>
            <div class="progress-step" id="step3"></div>
          </div>

          <div class="content-grid">
            <div class="report-side">
              <!-- Injected translation support -->
              <h3 data-ar="الصورة المتضررة" data-en="Damage Photo">الصورة المتضررة</h3>
              <div id="reportImageContainer" class="report-image-box">
                <!-- Injected translation support -->
                <span
                  class="placeholder-text"
                  data-ar="جاري تحميل الصورة..."
                  data-en="Loading image..."
                >
                  جاري تحميل الصورة...
                </span>
              </div>
            </div>

            <div class="upload-side">
              <!-- Injected translation support -->
              <h3 data-ar="الصورة بعد الإصلاح" data-en="Repair Photo">الصورة بعد الإصلاح</h3>

              <div class="small-upload-row">
                <!-- Injected translation support -->
                <label
                  for="completionImage"
                  class="small-upload-btn"
                  data-ar="اختر صورة"
                  data-en="Choose Photo"
                >
                  <i class="fa-solid fa-image"></i>
                  اختر صورة
                </label>
                <input id="completionImage" type="file" accept="image/*" />
                <!-- Injected translation support -->
                <span
                  id="fileNameDisplay"
                  class="file-name"
                  data-ar="لم يتم اختيار ملف"
                  data-en="No file selected"
                >
                  لم يتم اختيار ملف
                </span>
              </div>
            </div>
          </div>

          <div class="status-section">
            <!-- Injected translation support -->
            <h3 data-ar="الحالة" data-en="Status">الحالة</h3>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="status" value="completed" />
                <!-- Injected translation support -->
                <span data-ar="مكتمل" data-en="Completed">مكتمل</span>
              </label>

              <label class="radio-option">
                <input type="radio" name="status" value="pending" />
                <!-- Injected translation support -->
                <span data-ar="تنازل" data-en="Dismissed">تنازل</span>
              </label>
            </div>
          </div>

          <div class="notes-section">
            <!-- Injected translation support -->
            <label for="notes" data-ar="ملاحظات" data-en="Notes">ملاحظات</label>
            <!-- Injected translated placeholders -->
            <textarea
              id="notes"
              placeholder="اكتب ملاحظات المهندس هنا..."
              data-placeholder-ar="اكتب ملاحظات المهندس هنا..."
              data-placeholder-en="Add engineer notes..."
            ></textarea>
          </div>

          <div class="action-row">
            <!-- Injected translation support -->
            <button
              id="updateBtn"
              data-ar="تحديث الحالة"
              data-en="Update Status"
            >
              تحديث الحالة
            </button>
          </div>
        </section>
        <div id="toastContainer" class="toast-container"></div>
      </main>
    </div>

    <script type="module" src="./statics/js/loadSidebar.js"></script>
    <script type="module" src="./statics/js/update.js"></script>
    <!-- Injected settings integration for dark mode and translations -->
    <script type="module" src="./statics/js/settings.js"></script>
  </body>
</html>
