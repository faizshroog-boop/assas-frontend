<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نسيت كلمة المرور</title>

    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./statics/css/forgot_password.css" />
  </head>

  <body class="login-page">
    <div class="page-bg"></div>

    <header class="top-bar">
      <div class="right">
        <img
          src="./statics/img/Assas_clear_logo.png"
          class="assas-logo"
          alt="شعار عسّاس"
        />
      </div>

      <div class="left">
        <span class="lang language-toggle">
          <span class="lang-text" data-ar="English" data-en="العربية">
            English
          </span>

          <i class="fa-solid fa-globe"></i>
        </span>

        <img
          src="./statics/img/saudi_grey_palm.png"
          class="vision-logo"
          alt="رؤية السعودية 2030"
        />
      </div>
    </header>

    <div class="green-panel"></div>

    <main class="login-card">
      <h2 class="login-title">
        <span data-ar="نسيت كلمة المرور؟" data-en="Forgot Password?">
          نسيت كلمة المرور؟
        </span>

        <a href="eng_login.html" class="back-arrow">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </h2>

      <p
        class="hint"
        data-ar="أدخل بريدك الإلكتروني لإرسال كود التحقق"
        data-en="Enter your email to receive the verification code"
      >
        أدخل بريدك الإلكتروني لإرسال كود التحقق
      </p>

      <div class="input-group">
        <span class="input-icon">
          <i class="fa-solid fa-envelope"></i>
        </span>

        <input
          type="email"
          id="email"
          placeholder="Email"
          data-placeholder-ar="البريد الإلكتروني"
          data-placeholder-en="Email"
        />
      </div>

      <button
        id="sendCodeBtn"
        class="login-btn"
        data-ar="إرسال الكود"
        data-en="Send Code"
      >
        إرسال الكود
      </button>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="./statics/js/forgot_password_flow.js"></script>

    <script type="module" src="./statics/js/settings.js"></script>
  </body>
</html>
