<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engineer Profile</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- style sheet -->
    <link rel="stylesheet" href="../statics/css/profile.css" />
  </head>

  <body>
    
    <div class="container">
      <div id="sidebar-container"></div>
      

      <main>
        <div class="profile-header">
          <img
            id="profile_img"
            src="../statics/img/user.png"
            class="profile-img"
          />

          <div class="profile-text">
            <h2 id="name">...</h2>
            <p id="employee_id">...</p>
            <span id="role"></span><br />
            <span id="role2"></span>
          </div>

          <i class="fa-solid fa-arrow-left back-icon" onclick="goBack()"></i>
        </div>

        <div class="contact-row">
          <span
            ><i class="fa-solid fa-phone"></i> <span id="phone"></span
          ></span>
          <span
            ><i class="fa-solid fa-envelope"></i> <span id="email"></span
          ></span>
        </div>

        <h3 class="section-title">معلومات العمل</h3>
        <section class="card">
          <div class="grid">
            <div><strong>القسم</strong><span id="department"></span></div>

            <div>
              <strong>الدور الوظيفي</strong>
              <span id="role_display"></span>
            </div>

            <div>
              <strong>حالة الحساب</strong>
              <span id="status" class="status-active"></span>
            </div>

            <div>
              <strong>تاريخ الانضمام</strong>
              <span id="joined_date"></span>
            </div>
          </div>
        </section>

        <h3 class="section-title">ملخص النشاط</h3>
        <section class="card">
          <div class="grid">
            <div>
              <strong id="task_label">عدد البلاغات المستلمة</strong
              ><span id="total_reports"></span>
            </div>

            <div>
              <strong>بلاغات قيد المعالجة</strong
              ><span id="reports_in_progress"></span>
            </div>

            <div>
              <strong>بلاغات مكتملة</strong><span id="completed_reports"></span>
            </div>

            <div><strong>آخر نشاط</strong><span id="last_activity"></span></div>
          </div>
        </section>
        <h3 class="section-title">الإعدادات</h3>
        <section class="card">
          <div class="settings">
            <span>الوضع الليلي</span>
            <label class="switch">
              <input
                type="checkbox"
                onchange="document.body.classList.toggle('dark')"
              />
              <span class="slider"></span>
            </label>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="../statics/js/profile.js"></script>
    <script type="module" src="../statics/js/loadSidebar.js"></script>
  </body>
</html>
