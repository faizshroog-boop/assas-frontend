<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./statics/css/settings.css" />
    <title>Engineer Profile</title>

    <!-- Assas icon -->
    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo.png"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Profile stylesheet -->
    <link rel="stylesheet" href="./statics/css/profile.css" />

    <!-- Additional custom style for edit overlay -->
    <style>
      .profile-img-container {
        position: relative;
        width: 120px;
        height: 120px;
        cursor: pointer;
      }
      .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #145b44;
      }
      .edit-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .profile-img-container:hover .edit-overlay {
        opacity: 1;
      }
      #save_image_btn {
        margin-top: 10px;
        background-color: #145b44;
        color: white;
        border: none;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-family: "Cairo", sans-serif;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="sidebar-container"></div>

      <main>
        <div class="profile-header">
          <!-- Image container with edit overlay (translation & dark mode ready) -->
          <div
            class="profile-img-container"
            onclick="document.getElementById('imageInput').click()"
          >
            <img
              id="profile_img"
              src="./statics/img/user.png"
              class="profile-img"
            />
            <div class="edit-overlay">
              <span data-ar="تحرير" data-en="Edit"
                ><i class="fa-solid fa-camera"></i> تحرير</span
              >
            </div>
          </div>

          <!-- Hidden file input -->
          <input
            type="file"
            id="imageInput"
            accept="image/*"
            style="display: none"
          />

          <div class="profile-text">
            <h2 id="name">...</h2>
            <p id="employee_id">...</p>
            <span id="role"></span><br />
            <span id="role2"></span>

            <!-- Save button (translation & dark mode ready) -->
            <button
              id="save_image_btn"
              style="display: none"
              data-ar="حفظ الصورة"
              data-en="Save Image"
            >
              حفظ الصورة
            </button>
          </div>

          <i class="fa-solid fa-arrow-left back-icon" onclick="goBack()"></i>
        </div>

        <div class="contact-row">
          <span
            ><i class="fa-solid fa-phone"></i> <span id="phone"></span
          ></span>
          <span
            ><i class="fa-solid fa-envelope"></i> <span id="email"></span
          ></span>
        </div>

        <!-- Work Information (translation ready) -->
        <h3
          class="section-title"
          data-ar="معلومات العمل"
          data-en="Work Information"
        >
          معلومات العمل
        </h3>
        <section class="card">
          <div class="grid">
            <div>
              <strong data-ar="القسم" data-en="Department">القسم</strong
              ><span id="department"></span>
            </div>
            <div>
              <strong data-ar="الدور الوظيفي" data-en="Job Role"
                >الدور الوظيفي</strong
              ><span id="role_display"></span>
            </div>
            <div>
              <strong data-ar="حالة الحساب" data-en="Account Status"
                >حالة الحساب</strong
              ><span id="status" class="status-active"></span>
            </div>
            <div>
              <strong data-ar="تاريخ الانضمام" data-en="Joining Date"
                >تاريخ الانضمام</strong
              ><span id="joined_date"></span>
            </div>
          </div>
        </section>

        <!-- Activity Summary (translation ready) -->
        <h3
          class="section-title"
          data-ar="ملخص النشاط"
          data-en="Activity Summary"
        >
          ملخص النشاط
        </h3>
        <section class="card">
          <div class="grid">
            <div>
              <strong
                id="task_label"
                data-ar="عدد البلاغات المستلمة"
                data-en="Received Reports"
                >عدد البلاغات المستلمة</strong
              ><span id="total_reports"></span>
            </div>
            <div>
              <strong
                data-ar="بلاغات قيد المعالجة"
                data-en="Reports In Progress"
                >بلاغات قيد المعالجة</strong
              ><span id="reports_in_progress"></span>
            </div>
            <div>
              <strong data-ar="بلاغات مكتملة" data-en="Completed Reports"
                >بلاغات مكتملة</strong
              ><span id="completed_reports"></span>
            </div>
            <div>
              <strong data-ar="آخر نشاط" data-en="Last Activity"
                >آخر نشاط</strong
              ><span id="last_activity"></span>
            </div>
          </div>
        </section>

        <!-- Settings (dark mode & language toggle) -->
        <h3 class="section-title" data-ar="الإعدادات" data-en="Settings">
          الإعدادات
        </h3>
        <section class="card">
          <div class="settings">
            <span data-ar="الوضع الليلي" data-en="Dark Mode">الوضع الليلي</span>
            <label class="switch">
              <input
                id="darkModeSwitch"
                type="checkbox"
                onchange="toggleDarkMode()"
              />
              <span class="slider"></span>
            </label>
          </div>

          <div class="settings">
            <span data-ar="اللغة" data-en="Language">اللغة</span>
            <label class="switch">
              <input
                id="languageSwitch"
                type="checkbox"
                onchange="toggleLanguage()"
              />
              <span class="slider"></span>
            </label>
          </div>
        </section>
      </main>
    </div>

    <!-- Core scripts -->
    <script type="module" src="./statics/js/profile.js"></script>
    <script type="module" src="./statics/js/loadSidebar.js"></script>
    <script type="module" src="./statics/js/settings.js"></script>

    <!-- Back navigation -->
    <script>
      function goBack() {
        window.history.back();
      }
    </script>
  </body>
</html>
