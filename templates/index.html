<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>عساس</title>

    <!-- Assas icon -->
    <link
      rel="icon"
      type="image/png"
      href="./statics/img/Assas_clear_logo_2.png"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- style sheet -->
    <link rel="stylesheet" href="./statics/css/index.css" />
    <!-- Injected dark theme support -->
    <link rel="stylesheet" href="./statics/css/settings.css" />
  </head>
  <body class="home-page">
    <!-- Navbar -->
    <header class="top-bar">
      <div class="right">
        <img
          src="./statics/img/Assas_clear_logo.png"
          class="assas-logo"
          alt="ASSAS Logo"
        />
      </div>

      <div class="left">
        <!-- Injected translation support and language toggle integration -->
        <span class="lang language-toggle">
          <span class="lang-text" data-ar="English" data-en="العربية">
            English
          </span>
          <i class="fa-solid fa-globe"></i>
        </span>

        <img
          src="./statics/img/saudi_green_palm.png"
          class="vision-logo"
          alt="Saudi Vision 2030"
        />
      </div>
    </header>

    <!-- Main Section -->
    <section class="hero">
      <!-- Injected translation support -->
      <h1 data-ar="أهلاً بك في عسّاس" data-en="Welcome to Assas">
        أهلاً بك في عسّاس
      </h1>
      <p
        data-ar="منصتك الذكية لرصد وتحسين جودة الطرق لخدمة المدن والمجتمع وتعزيز كفاءة الصيانة الذكية."
        data-en="A smart platform for monitoring road quality, prioritizing maintenance, and helping city teams respond faster."
      >
        منصتك الذكية لرصد وتحسين جودة الطرق لخدمة المدن والمجتمع وتعزيز كفاءة
        الصيانة الذكية.
      </p>

      <div class="cards">
        <!-- موظف عساس -->
        <div class="card employee">
          <div class="card-content">
            <!-- Injected translation support -->
            <h3 data-ar="موظف عسّاس" data-en="Assas Admin">موظف عسّاس</h3>
            <p
              data-ar="الصلاحيات الإدارية والتحليل"
              data-en="Manage reports<br>and analytics"
            >
              الصلاحيات الإدارية والتحليل
            </p>
            <a
              href="emp_login.html"
              class="card-arrow"
              data-ar="دخول"
              data-en="Login"
            >
              دخول <i class="fa-solid fa-arrow-left"></i>
            </a>
          </div>
          <img src="./statics/img/Assas_clear_logo_2.png" class="card-logo" />
        </div>

        <!-- مهندس عساس -->
        <div class="card engineer">
          <div class="card-content">
            <!-- Injected translation support -->
            <h3 data-ar="مهندس عسّاس" data-en="Assas Engineer">مهندس عسّاس</h3>
            <p
              data-ar="لاستلام المهام الميدانية"
              data-en="Receive and update<br>field tasks"
            >
              لاستلام المهام الميدانية
            </p>
            <a
              href="eng_login.html"
              class="card-arrow"
              data-ar="دخول"
              data-en="Login"
            >
              دخول <i class="fa-solid fa-arrow-left"></i>
            </a>
          </div>
          <img src="./statics/img/Assas_clear_logo.png" class="card-logo" />
        </div>
      </div>
    </section>

    <!-- Injected settings integration for dark mode and translations -->
    <script type="module" src="./statics/js/settings.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("logout") === "success") {
          alert("تم تسجيل الخروج بنجاح. شكراً لاستخدامك النظام!");

          // تنظيف الرابط ليبقى احترافياً (بدون ?logout=success)
          window.history.replaceState(
            {},
            document.title,
            window.location.pathname,
          );
        }
      });
    </script>
  </body>
</html>
