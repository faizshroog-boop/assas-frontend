<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- style sheet -->
    <link rel="stylesheet" href="../statics/css/upload.css" />

    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside>
        <img src="../statics/img/Assas_green_logo.png" alt="logo" />
        <ul>
          <li class="active">
            <a href="dashboard.html">
              <i class="fa-solid fa-chart-line"></i> لوحة التحكم
            </a>
          </li>
          <li>
            <a href="map.html">
              <i class="fa-solid fa-map-location-dot"></i> الخريطة
            </a>
          </li>
          <li>
            <a href="projects.html">
              <i class="fa-solid fa-folder"></i> المشاريع
            </a>
          </li>
          <li>
            <a href="profile.html">
              <i class="fa-solid fa-user"></i> الصفحة الشخصية
            </a>
          </li>
        </ul>

        <button class="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i> تسجيل خروج
        </button>
      </aside>

      <!-- Main Content -->
      <main>
        <!-- Map -->
        <div id="map"></div>

        <div class="input-group mb-3">
          <input type="file" class="form-control" id="inputGroupFile02" />
          <label class="input-group-text" for="inputGroupFile02">رفع</label>
        </div>
      </main>
    </div>

    <!-- Google Maps API must be loaded after map.js is defined -->
    <script type="module" src="../statics/js/map.js"></script>
    <script type="module" src="../statics/js/upload.js"></script>

    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-uPN8afr4qXu5JE1Iew0wR5WfK3YscwY&callback=initMap"
    ></script>

    <!-- bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
